name: Bug report
description: Report a reproducible OpenAudit problem
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the expected and actual behaviour.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard
        - Website management
        - Lighthouse scan
        - Pa11y scan
        - Crawler or links
        - Docker or deployment
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove credentials, tokens, and customer data before posting.
      render: shell
